name: iOS Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm packages
        run: npm install

      - name: Sync Web to iOS
        run: npx cap sync ios

      - name: Build iOS with xcodebuild
        run: |
          cd ios
          xcodebuild -project App/App.xcodeproj -scheme App -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build \
            build 2>&1

      - name: Package IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d 2>/dev/null | grep -v "Pods" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ios/build -name "App.app" -type d 2>/dev/null | head -1)
          fi
          echo "APP_PATH=$APP_PATH"
          ls -la "$APP_PATH" || { echo "App.app not found at $APP_PATH"; exit 1; }
          ls "$APP_PATH/App" || { echo "App binary missing!"; exit 1; }
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          chmod +x Payload/App.app/App || true
          # Zip Payload/ folder (NOT cd into it) so the IPA has Payload/App.app/Info.plist
          # iOS install tools require the Payload/ top-level wrapper
          zip -r tt-jizhang.ipa Payload/
          ls -la tt-jizhang.ipa
          echo "=== IPA structure (top level) ==="
          unzip -l tt-jizhang.ipa | head -10

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: tt-jizhang-ipa
          path: tt-jizhang.ipa
